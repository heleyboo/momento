<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nhật ký hình ảnh — Prototype</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e7e4df; }
  @keyframes protoSpin { to { transform: rotate(360deg); } }
  @keyframes protoFlash { 0% { opacity: 0; } 18% { opacity: 0.92; } 100% { opacity: 0; } }
  @keyframes protoIn { from { opacity: 0; transform: translateY(-10px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes protoPush { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes protoShimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  textarea::placeholder, input::placeholder { color: rgba(120,120,120,0.6); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="proto-screens.jsx"></script>
<script type="text/babel" src="proto-screens2.jsx"></script>
<script type="text/babel" src="proto-screens3.jsx"></script>
<script type="text/babel" src="proto-app.jsx"></script>
</body>
</html>
